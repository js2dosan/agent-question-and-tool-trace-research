# Classify the first 50 questions with Gemini 3.1 Flash-Lite and compare
# against the existing Gemini 2.5 Flash baseline.

provider: gemini
model: gemini-3.1-flash-lite

data_dir: outputs/20260601_194517_gemini_gemini-2.5-flash_bs50_subcat1_icl0_icl_sub0
providers_dir: configs/providers

test_file: test_predictions.csv
icl_demo_file: null

taxonomy_file: configs/taxonomy.yaml

batch_size: 50

row_start: 0
row_end: 50

prompts_root: prompts
prompts_register_in_opik: false
opik_capture_io: false

label_subcategories: true
include_icl_demo: false
include_subcategory_in_icl_demo: false

group_col: null

icl_demo_question_col: null
icl_demo_category_col: null
icl_demo_subcategory_col: null

test_question_col: question
test_category_col: null
test_subcategory_col: null

stats:
  seed: 42
  n_boot: 10000
  alpha: 0.05
  labels_order:
    - LLQ
    - DRQ
    - GDQ
